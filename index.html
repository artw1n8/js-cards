<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JavaScript Cards</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main>
		<div class="card">
			<div class="block">
				<div class="block-counter">1/10</div>
				<div class="block-info">Example</div>
			</div>
			<div class="btns">
				<button class="btn btn-show">Show answer</button>
				<button class="btn btn-next">Next</button>
			</div>
		</div>
	</main>

	<script src="main.js"></script>
</body>
</html>
